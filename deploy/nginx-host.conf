# ─────────────────────────────────────────────────────────────────────────
# PATTERN A: Global host nginx + container nginx (recommended)
# ─────────────────────────────────────────────────────────────────────────
# Use when nginx is already running on the host (other sites, TLS termination)
# and Cord is just another upstream.
#
# Prerequisites:
#   - Cord running via `docker compose -f docker-compose.prod.yaml up -d`
#     → frontend container listens on 127.0.0.1:8080
#   - You already have SSL certificates for the domain (Let's Encrypt, mkcert,
#     paid — doesn't matter). This config does NOT issue certificates.
#
# Install:
#   1. sudo cp nginx-host.conf /etc/nginx/sites-available/cord
#   2. Edit server_name and ssl_certificate paths
#   3. sudo ln -s /etc/nginx/sites-available/cord /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx
#
# The container nginx inside the image already routes /api, /media, /ws
# internally — DO NOT duplicate those locations here. Just proxy everything
# to localhost:8080.

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name cord.example.com;
    return 301 https://$host$request_uri;
}

# Main HTTPS vhost
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cord.example.com;

    # ── SSL certificates ────────────────────────────────────────────────
    # Replace with your own paths.
    ssl_certificate     /path/to/your/fullchain.pem;
    ssl_certificate_key /path/to/your/privkey.pem;
    # Modern TLS settings (optional):
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers   HIGH:!aNULL:!MD5;

    # ── Hardening ───────────────────────────────────────────────────────
    server_tokens off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Logs (optional) ─────────────────────────────────────────────────
    access_log /var/log/nginx/cord.access.log;
    error_log  /var/log/nginx/cord.error.log;

    # ── Real client IP ──────────────────────────────────────────────────
    # If Cloudflare sits in front, uncomment and add the full Cloudflare
    # range list (https://www.cloudflare.com/ips/):
    # set_real_ip_from 173.245.48.0/20;
    # set_real_ip_from 103.21.244.0/22;
    # ...
    # real_ip_header CF-Connecting-IP;

    # ── Proxy everything to the container ───────────────────────────────
    # Container nginx already knows about /api, /media, /ws and the SPA —
    # we just forward + add WebSocket headers and real-IP forwarding.
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # WebSocket support (for /ws endpoint)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forwarding headers — backend reads X-Forwarded-For for fail2ban.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts so WebSocket connections don't get killed at idle.
        proxy_read_timeout 1d;
        proxy_send_timeout 1d;
    }
}
