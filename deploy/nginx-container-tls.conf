# ─────────────────────────────────────────────────────────────────────────
# PATTERN B: nginx ONLY inside the container, with TLS
# ─────────────────────────────────────────────────────────────────────────
# Use when there's no nginx on the host and you want the container to
# terminate HTTPS directly on ports 80/443. Suited for small VPS where Cord
# is the only public-facing service.
#
# Prerequisites:
#   - You already have SSL certificates on the host. Any source: Let's Encrypt,
#     mkcert, paid — doesn't matter. This config does NOT issue certificates.
#   - You know where to mount them in via docker-compose.tls.yaml.
#
# Install:
#   1. Edit ssl_certificate paths below — they refer to paths INSIDE the
#      container after mounting via the compose override.
#   2. Edit server_name (or leave _ if you only have one domain).
#   3. Run with the TLS override:
#         docker compose \
#           -f docker-compose.prod.yaml \
#           -f docker-compose.tls.yaml \
#           up -d
#
# Cert renewal:
#   After replacing cert files on the host, restart the frontend container
#   so nginx reloads them. Renewal automation is your responsibility.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # If you do webroot-style cert renewal, uncomment below and mount the
    # webroot dir via docker-compose.tls.yaml:
    # location /.well-known/acme-challenge/ {
    #     root /var/www/certbot;
    # }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — serves SPA + proxies to backend
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # ── SSL certificates ────────────────────────────────────────────────
    # Paths INSIDE the container after mounting via docker-compose.tls.yaml.
    # By default the override mounts /etc/letsencrypt from the host —
    # you can change the source dir there.
    ssl_certificate     /etc/letsencrypt/live/cord.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cord.example.com/privkey.pem;

    # Modern TLS settings (Mozilla intermediate)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Hardening ───────────────────────────────────────────────────────
    server_tokens off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Upload size ─────────────────────────────────────────────────────
    # 0 = no limit. Default nginx limit is 1MB which is too small for any
    # real upload (avatars, attachments, voice messages).
    client_max_body_size 0;

    # ── LiveKit signaling tunnel (optional) ─────────────────────────────
    # If you want to tunnel LiveKit signaling through this 443 connection
    # instead of exposing port 7880 separately, uncomment and set
    # LIVEKIT_PUBLIC_URL=wss://your.domain/livekit in .env.
    # Note: this only tunnels signaling (WebSocket); media (UDP 7882,
    # TCP 7881) still needs to be reachable directly.
    #
    # location /livekit/ {
    #     proxy_pass http://livekit:7880/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host              $host;
    #     proxy_set_header X-Real-IP         $remote_addr;
    #     proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_set_header Upgrade           $http_upgrade;
    #     proxy_set_header Connection        $connection_upgrade;
    #     proxy_read_timeout 86400;
    # }

    # ── Static SPA ──────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── Backend proxy (Docker DNS — `backend:8000`) ─────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /media/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering on;
    }

    location /ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade         $http_upgrade;
        proxy_set_header Connection      $connection_upgrade;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 1d;
        proxy_send_timeout 1d;
    }
}
