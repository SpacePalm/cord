name: Release images

# Release-only workflow: triggers ONLY on tag push (e.g. v1.2.0).
# Builds multi-arch (amd64 + arm64) and publishes:
#   ghcr.io/spacepalm/cord-{backend,frontend}:{version, major.minor, latest}
#
# Dev/test images (:dev tag) are built and pushed LOCALLY via
# scripts/ship-dev.sh — much faster than CI for tight feedback loops.
#
# Manual dispatch is left enabled as an emergency fallback (e.g. if local
# Docker is unavailable). It produces the same multi-arch release build.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # required to push to ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      # QEMU enables arm64 emulation for multi-arch builds.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Always multi-arch — both tag releases and manual dispatch
      # produce production-quality images.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.component }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,scope=${{ matrix.component }},mode=max
