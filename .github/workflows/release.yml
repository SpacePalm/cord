name: Build & publish images

# Триггеры:
#   - push тэга v* (релиз) → публикует образы как :{version}, :{major.minor}, :latest
#   - manual dispatch → можно собрать вручную, метит как :{branch} и :latest
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # требуется для push в ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Один job на компонент — параллельная сборка backend и frontend.
        component:
          - backend
          - frontend
    steps:
      - uses: actions/checkout@v4

      # QEMU + buildx нужны для multi-arch (amd64 + arm64).
      # arm64 — для Hetzner ARM, AWS Graviton, Raspberry Pi и т.п.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Генерируем теги: для v1.2.3 будет 1.2.3, 1.2, latest.
      # Для manual dispatch — branch name и latest.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.component }}
          push: true
          # arm64 заметно медленнее (через QEMU emulation), но образ нужен один
          # раз на тэг. Для каждодневных билдов через manual dispatch можно
          # ограничить только amd64 — сейчас публикуем всё для удобства юзеров.
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache — ускоряет повторные сборки в разы.
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,scope=${{ matrix.component }},mode=max
