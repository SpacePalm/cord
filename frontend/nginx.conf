# Cord frontend nginx config.
# Serves the built SPA from /usr/share/nginx/html and proxies API/WS/media
# to the backend container via Docker DNS (`backend:8000`).

# WebSocket upgrade map (standard).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    server_tokens off;

    # ─── Static SPA ─────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Long cache for hashed assets (Vite emits `assets/*.[hash].js`).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unknown URL → index.html (React Router resolves).
    location / {
        try_files $uri $uri/ /index.html;
        # Don't long-cache index.html — otherwise users see stale builds after release.
        add_header Cache-Control "no-cache";
    }

    # ─── Proxy to backend ───────────────────────────────────────────────
    # /api/* — REST API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # /media/* — public avatars and protected attachment files
    location /media/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering on;
    }

    # /ws — WebSocket (real-time messages, typing, calls)
    location /ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade         $http_upgrade;
        proxy_set_header Connection      $connection_upgrade;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Long timeout — WS connection should outlive nginx default (60s idle).
        proxy_read_timeout 1d;
        proxy_send_timeout 1d;
    }
}
